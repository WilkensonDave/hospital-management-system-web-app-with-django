<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
        <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
        <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" rel="stylesheet" />
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="{% static '../assets/css/styles.css' %}" />
</head>
<body>
    {% block sidebar %}
        <div class="col-lg-3 col-md-4 col-12">
            <nav class="navbar navbar-expand-md shadow-sm mb-4 mb-lg-0 sidenav border rounded">
                <a class="d-xl-none d-lg-none d-md-none text-inherit fw-bold text-decoration-none text-dark p-3" href="#"> Menu </a>
                <button class="navbar-toggler d-md-none icon-shape icon-sm rounded bg-primary text-light m-3" type="button" data-bs-toggle="collapse" data-bs-target="#sidenav" aria-controls="sidenav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="bi bi-grid"></span>
                </button>

                <div class="collapse navbar-collapse p-3" id="sidenav">
                    <div class="navbar-nav flex-column">
                        <div class="d-flex align-items-center mb-3">
                            {% if doctor.profile_image %}
                            <img src="{{ doctor.profile_image.url }}" alt="avatar" class="rounded-circle avatar-xl" style="width: 70px; height: 70px; object-fit: cover" />
                            {% endif %}

                            <div class="ms-3">
                                <h5 class="mb-0 fw-bold">DR. {{doctor.full_name}}</h5>
                                <p class="mb-1 fs-6">Doctor ID: {{doctor.id}}</p>
                            </div>
                        </div>
                        <ul class="list-unstyled ms-n2 mb-4">
                            <li class="nav-item">
                                <a class="dropdown-item nav-link" href="{% url 'dashboard' %}"><i class="bi bi-grid-fill"></i> Dashboard</a>
                            </li>
                            <li class="nav-item">
                                <a class="dropdown-item nav-link" href="{% url 'appointments' %}"><i class="fas fa-calendar"></i>Appointment</a>
                            </li>
                            <li class="nav-item">
                                <a class="dropdown-item nav-link" href="{% url 'payments_details' %}"><i class="fas fa-credit-card"></i> Payments</a>
                            </li>
                            <li class="nav-item">
                                <a class="dropdown-item nav-link" href="{% url 'notifications' %}"><i class="fas fa-bell"></i>Notification</a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="{% url 'edit_doctor_profile' %}"> <i class="fas fa-edit"></i> Edit Profile </a>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="{% url 'logout' %}"> <i class="fas fa-sign-out-alt"></i> Sign Out </a>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>
        </div>
    {% endblock %}
</body>
</html>
